version: "3.8"

services:
  feuerwehr-app:
    build: .
    container_name: feuerwehr-datenbank
    ports:
      - "8000:8000"
    volumes:
      # Persistiere die Datenbank außerhalb des Containers
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/feuerwehr.db
      - APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
